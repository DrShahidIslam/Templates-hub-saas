name: Cache Warmer — ISR Page Generator

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production URL to warm (e.g. https://your-domain.com)"
        required: false
        default: "https://your-production-domain.com"

jobs:
  warm-cache:
    name: Warm ISR Cache
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max for ~1800 pages at 6s intervals

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: pip install requests

      - name: Run cache warmer
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
        run: python scripts/warmer.py
